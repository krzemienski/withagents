<text x="206.15" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Layer 1: SwiftUI\nHTTP / SSE&quot;</text>
<text x="206.15" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">/&quot;Boundary 1: SSE text/event-stream&quot;/</text>
<text x="206.15" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Layer 2: Vapor Backend\nProcess + GCD&quot;</text>
<text x="206.15" y="286" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">/&quot;Boundary 2: stdout pipe&quot;/</text>
<text x="206.15" y="362" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Layer 3: Python Bridge\nNDJSON on stdout&quot;</text>
<text x="206.15" y="438" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">/&quot;Boundary 3: NDJSON newline-delimited&quot;/</text>
<text x="206.15" y="514" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Layer 4: Claude CLI\nSDK async iterator&quot;</text>
<text x="206.15" y="590" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">/&quot;Boundary 4: SDK async stream&quot;/</text>
<text x="206.15" y="666" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Layer 5: Anthropic API\nOAuth HTTP&quot;</text>
<text x="206.15" y="742" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">/&quot;Boundary 5: JSON over HTTPS&quot;/</text>
<text x="206.15" y="818" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">/&quot;Boundary 6: OAuth token refresh&quot;/</text>
</svg>