<text x="6802.3125" y="1189.25" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#fff">&quot;debate\n\nstability: 0.6\nsimilarity: 0.7\nstyle: 0.5\n\nVoice: Rigorous, balanced\nSections: Opening Statements,\nCase For, Case Against,\nCross-Examination,\nClosing Arguments&quot;</text>
