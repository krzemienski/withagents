<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 500" width="560" height="500" style="--bg:#0d1117;--fg:#e6edf3;--line:#3d444d;--accent:#4493f8;--muted:#9198a1;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 30%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.4, 0 4.8" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.4, 0 4.8" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line x1="70" y1="70" x2="70" y2="470" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="210" y1="70" x2="210" y2="470" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="350" y1="70" x2="350" y2="470" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="490" y1="70" x2="490" y2="470" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line x1="70" y1="90" x2="210" y2="90" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="140" y="84" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Submit task</text>
<polyline points="210,130 240,130 240,150 210,150" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="246" y="140" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Create initial plan</text>
<line x1="210" y1="200" x2="490" y2="200" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="350" y="194" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Submit plan for review</text>
<line x1="490" y1="240" x2="210" y2="240" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="350" y="234" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">REJECT - findings(completeness, feasibility, hand-waving, risk)</text>
<polyline points="210,280 240,280 240,300 210,300" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="246" y="290" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Revise plan incorporating findings</text>
<line x1="210" y1="350" x2="490" y2="350" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="350" y="344" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Resubmit revised plan</text>
<line x1="490" y1="390" x2="210" y2="390" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="350" y="384" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">APPROVE</text>
<line x1="210" y1="430" x2="70" y2="430" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#seq-arrow)" />
<text x="140" y="424" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-muted)">Return final plan</text>
<rect x="230.45999999999998" y="354" width="239.08" height="27" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<polygon points="463.53999999999996,354 469.53999999999996,360 463.53999999999996,360" fill="var(--_inner-stroke)" />
<text x="350" y="367.5" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Loop continues up to MAX_ITERATIONS = 5</text>
<rect x="30" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="70" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">User</text>
<rect x="168.975" y="30" width="82.05000000000001" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="210" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Planner</text>
<rect x="301.825" y="30" width="96.35000000000001" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="350" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Architect</text>
<rect x="450" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="490" y="50" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Critic</text>
</svg>