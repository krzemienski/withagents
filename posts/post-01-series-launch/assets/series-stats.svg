<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="0"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="130" x2="800" y2="130" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="270" x2="800" y2="270" stroke="#1e293b" stroke-width="1"/>
  <line x1="266" y1="130" x2="266" y2="400" stroke="#1e293b" stroke-width="1"/>
  <line x1="533" y1="130" x2="533" y2="400" stroke="#1e293b" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="800" height="62" fill="#111827" rx="0"/>
  <rect width="800" height="2" y="62" fill="#22d3ee" opacity="0.4"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700" letter-spacing="0.5">Agentic Development: By The Numbers</text>
  <text x="400" y="56" text-anchor="middle" fill="#64748b" font-size="11" letter-spacing="1">SERIES OVERVIEW METRICS</text>

  <!-- ── Row 1 ── -->

  <!-- Stat 1: AI Coding Sessions -->
  <rect x="16" y="78" width="234" height="106" fill="url(#cardGrad)" rx="8" stroke="#1e293b" stroke-width="1"/>
  <rect x="16" y="78" width="4" height="106" fill="#22d3ee" rx="2"/>
  <text x="138" y="122" text-anchor="middle" fill="#22d3ee" font-size="38" font-weight="800" filter="url(#glow)">4,500</text>
  <text x="138" y="144" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="500" letter-spacing="0.3">AI Coding Sessions</text>
  <text x="138" y="162" text-anchor="middle" fill="#475569" font-size="10">Tracked over 90-day period</text>

  <!-- Stat 2: Days -->
  <rect x="283" y="78" width="234" height="106" fill="url(#cardGrad)" rx="8" stroke="#1e293b" stroke-width="1"/>
  <rect x="283" y="78" width="4" height="106" fill="#f59e0b" rx="2"/>
  <text x="400" y="122" text-anchor="middle" fill="#f59e0b" font-size="38" font-weight="800" filter="url(#glow)">90</text>
  <text x="400" y="144" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="500" letter-spacing="0.3">Days</text>
  <text x="400" y="162" text-anchor="middle" fill="#475569" font-size="10">Production development cycle</text>

  <!-- Stat 3: Blog Posts -->
  <rect x="550" y="78" width="234" height="106" fill="url(#cardGrad)" rx="8" stroke="#1e293b" stroke-width="1"/>
  <rect x="550" y="78" width="4" height="106" fill="#6366f1" rx="2"/>
  <text x="667" y="122" text-anchor="middle" fill="#6366f1" font-size="38" font-weight="800" filter="url(#glow)">10</text>
  <text x="667" y="144" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="500" letter-spacing="0.3">Blog Posts</text>
  <text x="667" y="162" text-anchor="middle" fill="#475569" font-size="10">Deep-dive technical articles</text>

  <!-- ── Row 2 ── -->

  <!-- Stat 4: Companion Repos -->
  <rect x="16" y="204" width="234" height="106" fill="url(#cardGrad)" rx="8" stroke="#1e293b" stroke-width="1"/>
  <rect x="16" y="204" width="4" height="106" fill="#059669" rx="2"/>
  <text x="138" y="248" text-anchor="middle" fill="#059669" font-size="38" font-weight="800" filter="url(#glow)">10</text>
  <text x="138" y="270" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="500" letter-spacing="0.3">Companion Repos</text>
  <text x="138" y="288" text-anchor="middle" fill="#475569" font-size="10">Open-source code examples</text>

  <!-- Stat 5: Words -->
  <rect x="283" y="204" width="234" height="106" fill="url(#cardGrad)" rx="8" stroke="#1e293b" stroke-width="1"/>
  <rect x="283" y="204" width="4" height="106" fill="#a78bfa" rx="2"/>
  <text x="400" y="248" text-anchor="middle" fill="#a78bfa" font-size="38" font-weight="800" filter="url(#glow)">26,400</text>
  <text x="400" y="270" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="500" letter-spacing="0.3">Words</text>
  <text x="400" y="288" text-anchor="middle" fill="#475569" font-size="10">Total written across series</text>

  <!-- Stat 6: Bugs Fixed -->
  <rect x="550" y="204" width="234" height="106" fill="url(#cardGrad)" rx="8" stroke="#1e293b" stroke-width="1"/>
  <rect x="550" y="204" width="4" height="106" fill="#ef4444" rx="2"/>
  <text x="667" y="248" text-anchor="middle" fill="#ef4444" font-size="38" font-weight="800" filter="url(#glow)">12</text>
  <text x="667" y="270" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="500" letter-spacing="0.3">Bugs Fixed</text>
  <text x="667" y="288" text-anchor="middle" fill="#475569" font-size="10">P2+ issues caught by consensus</text>

  <!-- Footer -->
  <rect y="330" width="800" height="70" fill="#080f1a"/>
  <line x1="0" y1="330" x2="800" y2="330" stroke="#1e293b" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" fill="#475569" font-size="11">github.com/nicholasgasior</text>
  <text x="400" y="385" text-anchor="middle" fill="#334155" font-size="10" letter-spacing="0.5">AGENTIC DEVELOPMENT SERIES  ·  2025</text>
</svg>
