<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="600" height="250">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="250" fill="#0f172a"/>

  <!-- Title bar -->
  <rect width="600" height="50" fill="#111827"/>
  <rect width="600" height="1" y="50" fill="#334155"/>
  <text x="300" y="28" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="700">Bug Detection: Single Agent vs Consensus</text>
  <text x="300" y="44" text-anchor="middle" fill="#64748b" font-size="10" letter-spacing="1">CODE REVIEW EFFECTIVENESS</text>

  <!-- Y-axis label area -->
  <rect x="0" y="50" width="160" height="200" fill="#0f172a"/>

  <!-- Row 1: Single Agent -->
  <text x="20" y="103" fill="#94a3b8" font-size="13" font-weight="500">Single Agent</text>
  <text x="20" y="120" fill="#64748b" font-size="11">Review</text>

  <!-- Bar background track -->
  <rect x="160" y="85" width="380" height="32" fill="#1e293b" rx="4"/>
  <!-- Tiny red bar (0 bugs = near-zero width, show a sliver) -->
  <rect x="160" y="85" width="8" height="32" fill="#ef4444" rx="4" filter="url(#glow)"/>
  <!-- Label -->
  <text x="176" y="106" fill="#ef4444" font-size="12" font-weight="700">0 P2 Bugs Found</text>
  <!-- End label -->
  <text x="548" y="106" fill="#475569" font-size="11" text-anchor="middle">0</text>

  <!-- Row 2: 3-Agent Consensus -->
  <text x="20" y="168" fill="#94a3b8" font-size="13" font-weight="500">3-Agent</text>
  <text x="20" y="185" fill="#64748b" font-size="11">Consensus</text>

  <!-- Bar background track -->
  <rect x="160" y="150" width="380" height="32" fill="#1e293b" rx="4"/>
  <!-- Full green bar -->
  <rect x="160" y="150" width="380" height="32" fill="#059669" rx="4" filter="url(#glow)"/>
  <!-- Shine overlay -->
  <rect x="160" y="150" width="380" height="12" fill="white" rx="4" opacity="0.06"/>
  <!-- Label -->
  <text x="350" y="171" text-anchor="middle" fill="white" font-size="13" font-weight="700">2 P2 Bugs Found</text>
  <!-- End label -->
  <text x="548" y="171" fill="#6ee7b7" font-size="11" text-anchor="middle">2</text>

  <!-- Divider -->
  <line x1="160" y1="50" x2="160" y2="230" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Scale ticks -->
  <text x="160" y="225" fill="#475569" font-size="10" text-anchor="middle">0</text>
  <text x="350" y="225" fill="#475569" font-size="10" text-anchor="middle">1</text>
  <text x="540" y="225" fill="#475569" font-size="10" text-anchor="middle">2</text>
  <line x1="160" y1="220" x2="540" y2="220" stroke="#1e293b" stroke-width="1"/>
  <line x1="350" y1="218" x2="350" y2="222" stroke="#334155" stroke-width="1"/>
  <line x1="540" y1="218" x2="540" y2="222" stroke="#334155" stroke-width="1"/>

  <!-- Cost badge -->
  <rect x="430" y="57" width="158" height="24" fill="#1e293b" rx="4" stroke="#334155" stroke-width="1"/>
  <text x="509" y="73" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">Cost per gate: ~$0.15</text>
</svg>
