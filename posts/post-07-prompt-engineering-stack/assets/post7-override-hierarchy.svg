<text x="372.3" y="106" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#fff">&quot;Hook Exit Code\n(Layer 4-5)\nBINARY: pass or fail\nCannot be overridden&quot;</text>
<text x="372.3" y="199" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#fff">&quot;Security Scan\n(Layer 5)\nBLOCK = commit rejected\nNo exceptions&quot;</text>
