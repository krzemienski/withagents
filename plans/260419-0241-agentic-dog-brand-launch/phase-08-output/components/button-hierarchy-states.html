<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WithAgents — Button States Grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void:#040404;--panel-1:#0A0A0D;--panel-2:#111116;--panel-3:#15151C;
    --text-primary:#F5F5F7;--text-muted:#A1A1AA;--accent:#8B5CF6;--accent-alt:#C084FC;
    --accent-hot:#E879F9;--accent-lime:#A3E635;--border:rgba(255,255,255,0.10);
    --accent-wash:rgba(139,92,246,0.12);--font-display:'Space Grotesk',ui-sans-serif,system-ui,sans-serif;
    --font-body:'Inter',ui-sans-serif,system-ui,sans-serif;
    --font-mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
    --radius-sm:4px;--radius-md:8px;--space-xs:6px;--space-sm:12px;--space-md:20px;--space-lg:32px;--space-xl:48px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg-void);color:var(--text-primary);font-family:var(--font-body);padding:var(--space-xl);}
  .page-title{font-family:var(--font-display);font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:var(--space-lg);}
  table{border-collapse:collapse;width:100%;max-width:900px;}
  th{font-family:var(--font-mono);font-size:10px;letter-spacing:.10em;text-transform:uppercase;color:var(--text-muted);text-align:left;padding:var(--space-sm) var(--space-md) var(--space-sm) 0;border-bottom:1px solid var(--border);}
  td{padding:var(--space-sm) var(--space-md) var(--space-sm) 0;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
  td:first-child{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);white-space:nowrap;}
  .btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-body);font-weight:500;font-size:13px;border:none;border-radius:var(--radius-md);cursor:pointer;padding:9px 18px;white-space:nowrap;-webkit-font-smoothing:antialiased;}
  @media(prefers-reduced-motion:no-preference){.btn{transition:all 150ms cubic-bezier(0.4,0,0.2,1);}}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  /* Variants */
  .p  {background:var(--accent);color:#fff;border:1px solid transparent;}
  .p.h{background:var(--accent-alt);box-shadow:0 0 18px rgba(139,92,246,.30);}
  .p.f{outline:2px solid var(--accent);outline-offset:2px;background:var(--accent);color:#fff;}
  .p.a{background:#7C3AED;color:#fff;}
  .p.d{background:var(--accent);color:#fff;opacity:.35;cursor:not-allowed;}
  .s  {background:var(--panel-2);color:var(--text-primary);border:1px solid var(--border);}
  .s.h{background:var(--panel-3);border-color:rgba(139,92,246,.30);}
  .s.f{outline:2px solid var(--accent);outline-offset:2px;}
  .s.a{background:var(--panel-1);}
  .s.d{opacity:.35;cursor:not-allowed;}
  .t  {background:var(--accent-wash);color:var(--accent-alt);border:1px solid rgba(139,92,246,.20);}
  .t.h{background:rgba(139,92,246,.20);border-color:rgba(139,92,246,.36);}
  .t.f{outline:2px solid var(--accent);outline-offset:2px;}
  .t.a{background:rgba(139,92,246,.10);}
  .t.d{opacity:.35;cursor:not-allowed;}
  .g  {background:transparent;color:var(--text-muted);border:1px solid transparent;}
  .g.h{background:var(--panel-2);color:var(--text-primary);border-color:var(--border);}
  .g.f{outline:2px solid var(--accent);outline-offset:2px;}
  .g.a{background:var(--panel-3);}
  .g.d{opacity:.35;cursor:not-allowed;}
  .dr  {background:rgba(239,68,68,.12);color:#F87171;border:1px solid rgba(239,68,68,.22);}
  .dr.h{background:rgba(239,68,68,.20);border-color:rgba(239,68,68,.36);}
  .dr.f{outline:2px solid var(--accent);outline-offset:2px;}
  .dr.a{background:rgba(239,68,68,.08);}
  .dr.d{opacity:.35;cursor:not-allowed;}
</style>
</head>
<body>
<p class="page-title">withagents.dev — Button Hierarchy · All States Grid</p>
<table>
  <thead>
    <tr>
      <th>State</th>
      <th>Primary</th>
      <th>Secondary</th>
      <th>Tertiary</th>
      <th>Ghost</th>
      <th>Danger</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Default</td>
      <td><button class="btn p">Action</button></td>
      <td><button class="btn s">Action</button></td>
      <td><button class="btn t">Action</button></td>
      <td><button class="btn g">Action</button></td>
      <td><button class="btn dr">Remove</button></td>
    </tr>
    <tr>
      <td>Hover</td>
      <td><button class="btn p h">Action</button></td>
      <td><button class="btn s h">Action</button></td>
      <td><button class="btn t h">Action</button></td>
      <td><button class="btn g h">Action</button></td>
      <td><button class="btn dr h">Remove</button></td>
    </tr>
    <tr>
      <td>Focus-visible</td>
      <td><button class="btn p f">Action</button></td>
      <td><button class="btn s f">Action</button></td>
      <td><button class="btn t f">Action</button></td>
      <td><button class="btn g f">Action</button></td>
      <td><button class="btn dr f">Remove</button></td>
    </tr>
    <tr>
      <td>Active</td>
      <td><button class="btn p a">Action</button></td>
      <td><button class="btn s a">Action</button></td>
      <td><button class="btn t a">Action</button></td>
      <td><button class="btn g a">Action</button></td>
      <td><button class="btn dr a">Remove</button></td>
    </tr>
    <tr>
      <td>Disabled</td>
      <td><button class="btn p d" disabled aria-disabled="true">Action</button></td>
      <td><button class="btn s d" disabled aria-disabled="true">Action</button></td>
      <td><button class="btn t d" disabled aria-disabled="true">Action</button></td>
      <td><button class="btn g d" disabled aria-disabled="true">Action</button></td>
      <td><button class="btn dr d" disabled aria-disabled="true">Remove</button></td>
    </tr>
  </tbody>
</table>
</body>
</html>
